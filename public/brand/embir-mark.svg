<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Embir">
  <defs>
    <!-- Jewel gradient: champagne → gold (vertical) -->
    <linearGradient id="jGrad" x1="32" y1="14" x2="32" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5ECD7"/>
      <stop offset="0.2" stop-color="#E7D8B4"/>
      <stop offset="0.5" stop-color="#D4A574"/>
      <stop offset="0.8" stop-color="#C49556"/>
      <stop offset="1" stop-color="#B8843E"/>
    </linearGradient>
    <!-- Ring gradient: solid champagne -->
    <linearGradient id="rGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7D8B4"/>
      <stop offset="1" stop-color="#C8B691"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left ring (overlapping) -->
  <circle cx="25" cy="30" r="16" fill="none" stroke="url(#rGrad)" stroke-width="2.5" opacity="0.9"/>

  <!-- Right ring (overlapping) -->
  <circle cx="39" cy="30" r="16" fill="none" stroke="url(#rGrad)" stroke-width="2.5" opacity="0.9"/>

  <!-- Almond jewel at intersection -->
  <path d="M32 18 C26 24 24 30 24 34 C24 39 27 43 32 46 C37 43 40 39 40 34 C40 30 38 24 32 18 Z"
        fill="url(#jGrad)" filter="url(#glow)"/>

  <!-- Subtle specular highlight on jewel -->
  <ellipse cx="29" cy="24" rx="3" ry="2" fill="#FFFFFF" opacity="0.25"/>
</svg>
