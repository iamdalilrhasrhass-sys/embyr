<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embyr OG Image</title>
  <style>
    body { margin: 0; width: 1200px; height: 630px; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .container {
      width: 1200px; height: 630px;
      background: linear-gradient(135deg, #0a0414 0%, #1a0a2e 30%, #2d1b4e 60%, #0a0414 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    /* Aurora blobs */
    .blob1 {
      position: absolute; top: -100px; left: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(251,113,133,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .blob2 {
      position: absolute; bottom: -150px; right: -100px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .blob3 {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 800px; height: 400px;
      background: radial-gradient(ellipse, rgba(245,158,11,0.06) 0%, transparent 60%);
    }
    .content { position: relative; z-index: 1; text-align: center; }
    h1 {
      font-size: 96px; font-weight: 900; letter-spacing: -4px; margin: 0;
      background: linear-gradient(135deg, #fda4af 0%, #fbbf24 40%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 28px; color: rgba(255,255,255,0.6); margin-top: 16px;
      font-weight: 400; letter-spacing: 2px;
    }
    .domain {
      font-size: 18px; color: rgba(255,255,255,0.3); margin-top: 40px;
      letter-spacing: 4px; text-transform: uppercase;
    }
    .heart {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 400px; opacity: 0.03; z-index: 0;
    }
    .grid {
      position: absolute; inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }
    .badge {
      position: absolute; top: 30px; right: 30px;
      background: rgba(251,113,133,0.15); border: 1px solid rgba(251,113,133,0.3);
      padding: 8px 20px; border-radius: 100px;
      font-size: 14px; color: rgba(255,255,255,0.7); z-index: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid"></div>
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="blob3"></div>
    <div class="heart">♥</div>
    <div class="badge">🚀 Gratuit au lancement</div>
    <div class="content">
      <h1>Embyr</h1>
      <div class="tagline">Rencontres entre hommes. Gratuit.</div>
      <div class="domain">embir.xyz</div>
    </div>
  </div>
</body>
</html>
